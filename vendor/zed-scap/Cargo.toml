    "wayland",
    "x11",
]
wayland = [
    "dep:pipewire",
    "dep:dbus",
]
x11 = [
    "dep:xcb",
    "dep:x11",
]

[lib]
name = "zed_scap"
path = "src/lib.rs"

[[bin]]
