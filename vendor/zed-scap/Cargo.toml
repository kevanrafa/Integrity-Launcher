[package]
edition = "2021"
rust-version = "1.71"
name = "zed-scap"
version = "0.0.8-zed"
authors = [
    "Siddharth <siddharth99c@gmail.com>",
    "Pranav <pranav2000joglekar@gmail.com>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Modern, high-performance screen capture library for Rust. Cross-platform."
documentation = "https://docs.rs/scap"
readme = "README.md"
keywords = [
    "screen",
    "recording",
    "video",
    "capture",
    "media",
]
categories = [
    "graphics",
    "multimedia",
    "multimedia::video",
]
license = "MIT"
repository = "https://github.com/helmerapp/scap"

[features]
