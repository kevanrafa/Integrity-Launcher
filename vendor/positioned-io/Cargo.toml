[package]
edition = "2021"
rust-version = "1.71"
name = "positioned-io"
version = "0.3.5"
authors = [
    "Dave Vasilevsky <dave@vasilevsky.ca>",
    "Niklas Fiekas <niklas.fiekas@backscattering.de>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Reading and writing at an offset"
readme = "README.md"
keywords = [
    "read",
    "offset",
    "pread",
    "pwrite",
    "endian",
]
categories = [
    "filesystem",
    "os",
]
license = "MIT"
repository = "https://github.com/vasi/positioned-io"

[features]
default = ["byteorder"]

[lib]
name = "positioned_io"
path = "src/lib.rs"

[[test]]
name = "model"
path = "tests/model.rs"

[[test]]
name = "test"
path = "tests/test.rs"

[dependencies.byteorder]
version = "1.2"
optional = true

[dev-dependencies.quickcheck]
version = "1"

[dev-dependencies.tempfile]
version = "3.0"

[target."cfg(unix)".dependencies.libc]
version = "0.2"

[target."cfg(windows)".dependencies.winapi]
version = "0.3"
features = [
    "basetsd",
    "minwindef",
    "handleapi",
    "fileapi",
    "sysinfoapi",
    "memoryapi",
    "winnt",
