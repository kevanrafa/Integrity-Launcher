[package]
edition = "2021"
rust-version = "1.65"
name = "ropey"
version = "2.0.0-beta.1"
authors = ["Nathan Vegdahl <cessen@cessen.com>"]
build = false
exclude = [
    "/design/*",
    "/fuzz",
    "/.github/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A fast and robust text rope for Rust"
documentation = "https://docs.rs/ropey"
readme = "README.md"
keywords = [
    "rope",
    "text",
    "edit",
    "buffer",
]
categories = [
    "text-processing",
    "data-structures",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cessen/ropey"

[package.metadata.docs.rs]
features = [
    "metric_chars",
    "metric_utf16",
    "metric_lines_lf",
    "metric_lines_lf_cr",
    "metric_lines_unicode",
]
rustdoc-args = [
    "--cfg",
    "docsrs",
]

[features]
__dev__small_chunks = []
default = [
    "metric_lines_lf_cr",
    "simd",
]
metric_chars = []
metric_lines_lf = []
metric_lines_lf_cr = []
metric_lines_unicode = []
metric_utf16 = []
simd = ["str_indices/simd"]

[lib]
name = "ropey"
path = "src/lib.rs"

[[test]]
name = "proptest_tests"
path = "tests/proptest_tests.rs"

[[bench]]
name = "create"
path = "benches/create.rs"
harness = false

[[bench]]
name = "hash"
path = "benches/hash.rs"
harness = false

[[bench]]
name = "insert"
path = "benches/insert.rs"
harness = false

[[bench]]
name = "iterators"
path = "benches/iterators.rs"
harness = false

[[bench]]
name = "queries"
path = "benches/queries.rs"
harness = false

[[bench]]
name = "remove"
path = "benches/remove.rs"
harness = false

[dependencies.str_indices]
version = "0.4"
default-features = false

[dev-dependencies.criterion]
version = "0.3"
features = ["html_reports"]

[dev-dependencies.fnv]
version = "1"

[dev-dependencies.fxhash]
version = "0.2"

[dev-dependencies.proptest]
version = "~1.6"

[dev-dependencies.rand]
version = "0.8"

[dev-dependencies.unicode-width]
version = "=0.1.13"
